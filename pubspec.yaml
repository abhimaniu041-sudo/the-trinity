name: the_trinity
description: Luxury Hyperlocal Marketplace for Shops, Customers and Professionals.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Data Storage
  shared_preferences: ^2.2.2

  # UI & Design Components
  google_fonts: ^6.1.0
  
  # Multi-Media Features (Compulsory for your features)
  image_picker: ^1.0.4       # Product aur Profile photos ke liye
  photo_view: ^0.14.0        # Images Zoom karne ke liye
  
  # Communication & Maps
  url_launcher: ^6.2.5       # Calling feature ke liye
  geolocator: ^10.1.0        # Location tracking ke liye

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Assets section (Make sure images are in this folder if needed)
  assets:
    - assets/icon.png
