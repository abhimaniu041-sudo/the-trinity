name: Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Reconstruct Project
        run: |
          # Ek temporary app banayein missing folders ke liye
          flutter create --platforms android .
          # Hamari original files ko ensure karein
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trinity-app-final
          path: build/app/outputs/flutter-apk/app-release.apk
